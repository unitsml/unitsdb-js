name: release

# npm publish with provenance (SLSA attestation via GitHub OIDC).
# Requires NPM_TOKEN secret (npm automation token with publish access).

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: "Version to publish (x.y.z, major, minor, patch, skip)"
        required: true
        default: 'skip'
  repository_dispatch:
    types: [ do-release ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.next_version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "skip" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Opal
        run: gem install opal --no-document

      - name: Install JS deps
        run: npm install

      - name: Build
        run: node scripts/build.js
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          RUBY_REF: ${{ github.event.client_payload.ruby_ref || format('v{0}', steps.ver.outputs.version) }}
          OPAL_PREFORK_DISABLE: "1"

      - name: Smoke test
        run: node scripts/test.js

      - name: Set package version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if [ "$VERSION" != "$(node -p "require('./package.json').version")" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
