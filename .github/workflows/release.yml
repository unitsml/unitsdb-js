name: release

# npm Trusted Publishing — passwordless via GitHub OIDC.
#
# Prerequisites (one-time, on npmjs.com):
#   Package → Settings → Publishing access → Add Trusted Publisher
#   Repository: <org>/<repo>
#   Workflow filename: release.yml
#   Environment: (leave blank unless you set one in the workflow below)
#
# No NPM_TOKEN secret needed. npm CLI 10.9.1+ handles OIDC automatically.

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: "npm version to publish (x.y.z, major, minor, patch, skip)"
        required: true
        default: 'skip'
      ruby_ref:
        description: "unitsdb-ruby git ref to compile from (e.g. v2.2.4, main). Leave empty to use version from repository_dispatch or 'main'."
        required: false
        default: ''
  repository_dispatch:
    types: [ do-release ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.next_version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "skip" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # NO registry-url — prevents setup-node from writing

      - name: Upgrade npm CLI (Trusted Publishers needs 10.9.1+)
        run: |
          npm install -g npm@latest
          npm --version          # _authToken to .npmrc, which would shadow OIDC auth.

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Opal
        run: gem install opal --no-document

      - name: Install JS deps
        run: npm install

      - name: Build
        run: node scripts/build.js
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          RUBY_REF: ${{ github.event.inputs.ruby_ref || github.event.client_payload.ruby_ref || 'main' }}
          OPAL_PREFORK_DISABLE: "1"

      - name: Smoke test
        run: node scripts/test.js

      - name: Set package version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if [ "$VERSION" != "$(node -p "require('./package.json').version")" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Publish to npm (Trusted Publisher — passwordless OIDC)
        run: npm publish --provenance --access public
