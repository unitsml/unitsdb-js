name: release

on:
  repository_dispatch:
    types: [do-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version of unitsdb-ruby to compile and publish (e.g., 2.2.5)"
        required: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve version + ruby_ref
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            RUBY_REF="${{ github.event.client_payload.ruby_ref }}"
          else
            VERSION="${{ github.event.inputs.version }}"
            RUBY_REF="v${VERSION}"
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "No version supplied; aborting."
            exit 1
          fi
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "ruby_ref=$RUBY_REF"     >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION ruby_ref=$RUBY_REF"

      - name: Idempotency check (skip if already published)
        id: check
        run: |
          set +e
          PUBLISHED=$(npm view "@unitsml/unitsdb@${{ steps.meta.outputs.version }}" version 2>/dev/null)
          if [ -n "$PUBLISHED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::@unitsml/unitsdb@${{ steps.meta.outputs.version }} is already on npm; skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Not yet published; proceeding."
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip != 'true'

      - name: Checkout unitsdb-ruby at ${{ steps.meta.outputs.ruby_ref }}
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: unitsml/unitsdb-ruby
          ref: ${{ steps.meta.outputs.ruby_ref }}
          path: unitsdb-ruby
          submodules: true

      - uses: ruby/setup-ruby@v1
        if: steps.check.outputs.skip != 'true'
        with:
          ruby-version: "3.3"
          working-directory: unitsdb-ruby

      - name: Bundle install (unitsdb-ruby)
        if: steps.check.outputs.skip != 'true'
        run: |
          rm -f Gemfile.lock
          bundle install --jobs 3 --retry 3
        working-directory: unitsdb-ruby
      # unitsdb-ruby's Gemfile already pins opal ~> 1.8 — no extra
      # install needed.

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm install --no-audit --no-fund
        if: steps.check.outputs.skip != 'true'

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: npm run build -- --version=${{ steps.meta.outputs.version }}

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
